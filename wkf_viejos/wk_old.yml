name: CI/CD Completo

on:
  # Push directo a cualquier rama feature dispara DEV
  push:
    branches:
      - 'feature/**'
      - develop
      - main

  # Pull request hacia develop
  pull_request:
    branches:
      - develop

jobs:

  # ----------------------------
  # 1️⃣ UNIT TESTS (Feature → DEV)
  # ----------------------------
  unit-tests:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/feature/') || github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Unit Tests
        run: pytest tests/unit

  # ----------------------------
  # 2️⃣ DEPLOY A DEV (solo si unit tests OK)
  # ----------------------------
  deploy-dev:
    needs: unit-tests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/feature/') || github.event_name == 'pull_request'
    
    steps:
      - name: Deploy a DEV
        run: |
          echo "Deployando a DEV..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}

  # ----------------------------
  # 3️⃣ INTEGRATION TESTS (Merge → develop)
  # ----------------------------
  integration-tests:
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Integration Tests
        run: pytest tests/integration

  # ----------------------------
  # 4️⃣ DEPLOY A QA
  # ----------------------------
  deploy-qa:
    needs: integration-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy a QA
        run: |
          echo "Deployando a QA..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_QA }}

  # ----------------------------
  # 5️⃣ SECURITY TESTS (sobre QA)
  # ----------------------------
  security-tests:
    needs: deploy-qa
    runs-on: ubuntu-latest
    
    steps:
      - name: Ejecutar Security Tests
        run: |
          pip install bandit
          bandit -r .

  # ----------------------------
  # 6️⃣ APROBACIÓN MANUAL PARA PRODUCCIÓN
  # ----------------------------
  approval:
    needs: security-tests
    runs-on: ubuntu-latest
    environment:
      name: production  # 🔥 habilita revisión manual en GitHub

    steps:
      - name: Esperando aprobación manual
        run: echo "Aprobación requerida para deploy a Producción"

  # ----------------------------
  # 7️⃣ DEPLOY A PRODUCCIÓN
  # ----------------------------
  deploy-prd:
    needs: approval
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy a Producción
        run: |
          echo "Deployando a Producción..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRD }}