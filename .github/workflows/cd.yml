name: CD - Con Aprobación en producción
on:
  push:
    branches:
      - develop
      - main
jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a DEV
        run: |
          echo "Iniciando deploy en DEV..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}

          echo "Esperando que el servicio inicie..."
          sleep 10

          for i in {1..10}; do
            echo "Intento $i..."

            if curl -f https://clinica-api-dev.onrender.com/health; then
              echo "✅ Deploy OK"
              exit 0
            fi

            echo "Aún no disponible..."
            sleep 20
          done

          echo "❌ Deploy FALLÓ - API no responde después de 10 intentos"
          exit 1

  deploy-qa:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a QA
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_QA }}
  deploy-prd:
    if: github.ref == 'refs/heads/main'
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: production   # requiere aprobación manual
    steps:
      - name: Deploy a PRD
        run: |
          echo "Deployando a PRODUCCIÓN..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRD }}