name: CD - Con Aprobación en producción
on:
  push:
    branches:
      - develop
      - main
jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a DEV
        run: |
          echo "Iniciando deploy en DEV..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}
          echo "Esperando que el servicio inicie..."
          sleep 120
          for i in {1..10}; do
            echo "Intento $i..."
            if curl -s -f --max-time 5 https://clinica-api-dev.onrender.com/health; then
              echo "✅ Deploy en DEV OK"
              exit 0
            fi
            echo "Aún no disponible..."
            sleep 30
          done
          echo "❌ Deploy FALLÓ en DEV - API no responde después de 10 intentos"
          exit 1

  deploy-qa:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a QA
        run: |
          echo "Iniciando deploy en QA..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_QA }}
          echo "Esperando que el servicio inicie..."
          sleep 120
          for i in {1..10}; do
            echo "Intento $i..."
            if curl -s -f --max-time 5 https://clinica-api-qa.onrender.com/health; then
              echo "✅ Deploy en QA OK"
              exit 0
            fi
            echo "Aún no disponible..."
            sleep 30
          done
          echo "❌ Deploy FALLÓ en QA - API no responde después de 10 intentos"
          exit 1
  
  deploy-prd:
    if: github.ref == 'refs/heads/main'
    needs: deploy-qa        
    runs-on: ubuntu-latest
    environment: production   # requiere aprobación manual
    steps:
      - name: Deploy a PRD
        run: |
          echo "Iniciando deploy en PRD..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRD }}
          echo "Esperando que el servicio inicie..."
          sleep 120
          for i in {1..10}; do
            echo "Intento $i..."
            if curl -s -f --max-time 5 https://clinica-api-prd.onrender.com/health; then
              echo "✅ Deploy en PRD OK"
              exit 0
            fi
            echo "Aún no disponible..."
            sleep 30
          done
          echo "❌ Deploy FALLÓ en PRD - API no responde después de 10 intentos"
          exit 1