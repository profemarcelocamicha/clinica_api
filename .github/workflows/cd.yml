name: CD - Con Aprobación en producción

on:
  push:
    branches:
      - develop
      - main

  workflow_dispatch:   # trigger manual

jobs:

  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a DEV
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}

  deploy-qa:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a QA
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_QA }}

  deploy-prd:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production   # aprobación obligatoria
    steps:
      - name: Deploy a PRD
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRD }}