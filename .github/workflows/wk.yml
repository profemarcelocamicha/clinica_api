name: CI/CD Completo con Aprobación

on:
  pull_request:
    branches:
      - develop

  push:
    branches:
      - develop

jobs:

  # 🧪 1. UNIT TESTS (en PR)
  unit-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - run: pip install -r requirements.txt

      - name: Ejecutar Unit Tests
        run: pytest tests/unit

  # 🚀 2. DEPLOY A DEV (solo si unit tests OK)
  deploy-dev:
    needs: unit-tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy a DEV
        run: |
          echo "Deployando a DEV..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}

  # 🔗 3. INTEGRATION TESTS (merge a develop)
  integration-tests:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - run: pip install -r requirements.txt

      - name: Ejecutar Integration Tests
        run: pytest tests/integration

  # 🚀 4. DEPLOY A QA
  deploy-qa:
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy a QA
        run: |
          echo "Deployando a QA..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_QA }}

  # 🔒 5. SECURITY TESTS (sobre QA)
  security-tests:
    needs: deploy-qa
    runs-on: ubuntu-latest

    steps:
      - name: Ejecutar Security Tests
        run: |
          pip install bandit
          bandit -r .

  # ⏳ 6. APROBACIÓN MANUAL
  approval:
    needs: security-tests
    runs-on: ubuntu-latest
    environment:
      name: production   # 🔥 esto habilita aprobación manual en GitHub

    steps:
      - name: Esperando aprobación manual
        run: echo "Aprobación requerida para producción"

  # 🚀 7. DEPLOY A PRODUCCIÓN
  deploy-prd:
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - name: Deploy a Producción
        run: |
          echo "Deployando a PRD..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRD }}